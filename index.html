<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podpořte NexaStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #141b2d;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #8b5cf6; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: #ffd700; }
        
        .mission {
            background: rgba(30, 41, 59, 0.5);
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
            line-height: 1.6;
            text-align: left;
            border-left: 4px solid #ffd700;
        }

        .support-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .qr-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(139, 92, 246, 0.5);
            text-align: center;
            transition: all 0.3s ease;
            width: 160px;
            cursor: pointer; /* Naznačí, že je to klikací */
        }
        .qr-box:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        .qr-box img {
            width: 130px;
            height: 130px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .qr-box p {
            margin: 0;
            font-weight: 600;
            color: #ffd700;
            font-size: 0.75rem;
        }

        .logo-box img {
            height: 90px;
            width: auto;
        }

        /* Styl pro vyskakovací okno (Modal) */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }
        #modal img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid #141b2d;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }

        @media (max-width: 600px) {
            .support-row { gap: 15px; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Nexa<span>Stream</span></h1>
        <h3 style="color: #a78bfa; font-weight: 400;">Komunita na prvním místě</h3>
        
        <div class="mission">
            <strong>Naše vize</strong><br>
            NexaStream je postaven na svobodném přístupu k obsahu. Vaše dobrovolné příspěvky nám pomáhají hradit servery a odměňovat uploadery za jejich čas.
        </div>

        <p class="text-sm">Klikněte na kód pro zvětšení a naskenujte mobilem:</p>

        <div class="support-row">
            <div class="qr-box" onclick="openModal('qr_revolut.png')">
                <img src="qr_revolut.png" alt="QR kód Revolut">
                <p>Příspěvek přes Revolut</p>
            </div>
            
            <div class="logo-box">
                <img src="nexastream_logo_glow.png" alt="Logo">
            </div>
        </div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="" alt="Zvětšený QR kód">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>

</body>
</html>
